# Default values for inventory-order.

nameOverride: ""
fullnameOverride: ""

commonLabels: { }

imagePullSecrets: [ ]

partGateway:
  enabled: true
  replicaCount: 1
  image:
    repository: ram1uj/part-gateway-service
    tag: ""
    pullPolicy: Never
  service:
    type: NodePort
    port: 8080
    targetPort: 8080
    nodePort: 30080
    name: part-gateway-nodeport
  env:
    springProfilesActive: dev
    port: "8080"
    partInventoryServiceUrl: http://part-inventory-service:8080
    partOrderServiceUrl: http://part-order-service:8080
  readinessProbe:
    enabled: true
    tcpSocketPort: 8080
    initialDelaySeconds: 10
    periodSeconds: 10
  livenessProbe:
    enabled: true
    tcpSocketPort: 8080
    initialDelaySeconds: 30
    periodSeconds: 20
  resources: { }

partInventory:
  enabled: true
  replicaCount: 2
  image:
    repository: ram1uj/part-inventory-service
    tag: ""
    pullPolicy: Always
  service:
    type: NodePort
    # Azure YAML exposes port 80 -> targetPort 8080
    port: 80
    targetPort: 8080
    nodePort: 30081
    name: part-inventory-service
  env:
    springProfilesActive: dev
    mysqlHost: mysql
    mysqlPort: "3306"
    mysqlDatabase: part_inventory_db
    mysqlUser: root
    mysqlPassword: password
  startupProbe:
    enabled: true
    httpGet:
      path: /actuator/health/liveness
      port: 8080
    failureThreshold: 30
    periodSeconds: 10
  livenessProbe:
    enabled: true
    httpGet:
      path: /actuator/health/liveness
      port: 8080
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    enabled: true
    httpGet:
      path: /actuator/health/readiness
      port: 8080
    periodSeconds: 5
    failureThreshold: 3
  resources:
    requests:
      cpu: "400m"
      memory: "256Mi"
    limits:
      cpu: "600m"
      memory: "512Mi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    cpu:
      enabled: true
      averageUtilization: 70
    memory:
      enabled: true
      averageUtilization: 80
    # requires custom metrics adapter; off by default
    customRequestsPerSecond:
      enabled: false
      averageValue: "100"

partOrder:
  enabled: true
  replicaCount: 1
  image:
    repository: ram1uj/part-order-service
    tag: latest
    pullPolicy: Always
  service:
    type: NodePort
    # Azure YAML exposes port 80 -> targetPort 8080
    port: 80
    targetPort: 8080
    nodePort: 30082
    name: part-order-service
  env:
    springProfilesActive: dev
    mysqlHost: mysql
    mysqlPort: "3306"
    mysqlDatabase: part_inventory_db
    mysqlUser: root
    mysqlPassword: password
    inventoryServiceUrl: http://part-inventory-service
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

ingress:
  enabled: true
  name: part-order-ingress
  className: nginx
  annotations:
    kubernetes.io/ingress.class: "nginx"
