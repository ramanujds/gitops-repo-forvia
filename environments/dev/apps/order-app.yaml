apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-service
  namespace: argocd
spec:
  destination:
    namespace: dev
    server: https://kubernetes.default.svc
  sources:
    - path: order-app-chart
      repoURL: https://github.com/ramanujds/gitops-repo-forvia
      targetRevision: HEAD
      helm:
        valueFiles:
          - $values/environments/dev/values/order-values.yaml
    - repoURL: https://github.com/ramanujds/gitops-repo-forvia
      targetRevision: HEAD
      ref: values
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true